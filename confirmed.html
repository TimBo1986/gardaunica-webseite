<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garda Unica — Anmeldung bestätigt</title>
<meta name="description" content="Deine Anmeldung für Garda Unica ist bestätigt. Wir melden uns, sobald es losgeht.">
<meta name="robots" content="noindex,follow">
<link rel="canonical" href="https://www.gardaunica.com/confirmed">
<meta property="og:title" content="Garda Unica — Anmeldung bestätigt">
<meta property="og:description" content="Perfetto — du bist dabei! Wir melden uns, sobald Garda Unica startet.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://www.gardaunica.com/confirmed">
<meta property="og:image" content="https://www.gardaunica.com/assets/og.jpg">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Sora:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --carta:#FAF5E8;--carta-warm:#F3EBD8;--carta-morn:#FDFAF2;
  --terracotta:#B54327;--terracotta-soft:#C96449;
  --sole:#E5A83A;--oliva:#5C6B3A;
  --notte:#1A2540;--notte-2:#4A5570;--notte-3:#8A93AB;
  --linea:rgba(26,37,64,.14);--linea-soft:rgba(26,37,64,.08);
  --f-display:'Fraunces',Georgia,serif;
  --f-ui:'Sora',ui-sans-serif,system-ui,sans-serif;
  --f-mono:'JetBrains Mono',ui-monospace,monospace;
  --ease:cubic-bezier(.2,.9,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--carta);color:var(--notte);font-family:var(--f-ui);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
a{color:inherit}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;max-width:640px;margin:0 auto;width:100%}
.logo{font-family:var(--f-display);font-weight:600;font-size:21px;text-decoration:none;letter-spacing:-.01em}
.logo em{font-style:italic;color:var(--terracotta)}
.lang{display:flex;gap:2px;border:1px solid var(--linea);border-radius:999px;padding:3px;background:var(--carta-morn)}
.lang button{border:0;background:none;cursor:pointer;font-family:var(--f-ui);font-size:12px;font-weight:600;letter-spacing:.04em;color:var(--notte-3);padding:5px 11px;border-radius:999px;transition:background 160ms var(--ease),color 160ms var(--ease)}
.lang button.active{background:var(--terracotta);color:var(--carta)}
.lang button:hover:not(.active){color:var(--notte)}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:24px 24px 72px;position:relative;overflow:hidden}
main::before{content:'';position:absolute;top:-140px;left:50%;transform:translateX(-50%);width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(229,168,58,.22),transparent 65%);pointer-events:none}
.card{position:relative;width:100%;max-width:440px;text-align:center}
.badge{width:76px;height:76px;border-radius:50%;margin:0 auto 24px;background:radial-gradient(circle at 36% 32%,#FFEFC2 0%,#E5A83A 50%,#B54327 100%);box-shadow:inset -3px -3px 8px rgba(142,50,22,.4),0 12px 30px -8px rgba(181,67,39,.45);display:flex;align-items:center;justify-content:center}
.badge svg{width:36px;height:36px;stroke:#FAF5E8;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
.eyebrow{font-family:var(--f-mono);font-size:11px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--terracotta)}
h1{font-family:var(--f-display);font-weight:500;font-size:clamp(30px,6vw,42px);line-height:1.14;letter-spacing:-.01em;margin-top:14px}
h1 em{font-style:italic;color:var(--terracotta)}
.sub{margin-top:16px;font-size:16.5px;color:var(--notte-2);line-height:1.65;max-width:36ch;margin-left:auto;margin-right:auto}
.btn-primary{display:inline-block;margin-top:30px;text-decoration:none;font-weight:600;font-size:15px;padding:15px 32px;border-radius:999px;background:var(--terracotta);color:var(--carta);transition:background 180ms var(--ease),transform 180ms var(--ease)}
.btn-primary:hover{background:var(--terracotta-soft);transform:translateY(-1px)}
.foot{margin-top:30px;font-family:var(--f-mono);font-size:11px;letter-spacing:.06em;color:var(--notte-3)}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<div class="topbar">
  <a class="logo" href="https://www.gardaunica.com">Garda <em>Unica</em></a>
  <div class="lang" role="group" aria-label="Sprache / Lingua / Language">
    <button data-lang="de" class="active">DE</button>
    <button data-lang="it">IT</button>
    <button data-lang="en">EN</button>
  </div>
</div>

<main>
  <div class="card">
    <div class="badge" aria-hidden="true">
      <svg viewBox="0 0 24 24"><polyline points="4 12.5 9.5 18 20 6.5"></polyline></svg>
    </div>
    <span class="eyebrow" data-i18n="cf_eyebrow">Sommer 2026</span>
    <h1 data-i18n="cf_h1">Perfetto — du bist <em>dabei!</em></h1>
    <p class="sub" data-i18n="cf_sub">Wir melden uns, sobald Garda Unica startet.</p>
    <a class="btn-primary" href="https://www.gardaunica.com" data-i18n="cf_btn">Zur Startseite</a>
    <div class="foot" data-i18n="cf_foot">Garda Unica · ein Produkt von LagoNord AI</div>
  </div>
</main>

<script>
var I18N={
  de:{
    cf_eyebrow:"Sommer 2026",
    cf_h1:"Perfetto — du bist <em>dabei!</em>",
    cf_sub:"Wir melden uns, sobald Garda Unica startet.",
    cf_btn:"Zur Startseite",
    cf_foot:"Garda Unica · ein Produkt von LagoNord AI",
    _title:"Garda Unica — Anmeldung bestätigt"
  },
  it:{
    cf_eyebrow:"Estate 2026",
    cf_h1:"Perfetto — ci <em>sei!</em>",
    cf_sub:"Ti scriviamo appena Garda Unica parte.",
    cf_btn:"Alla home",
    cf_foot:"Garda Unica · un prodotto di LagoNord AI",
    _title:"Garda Unica — Iscrizione confermata"
  },
  en:{
    cf_eyebrow:"Summer 2026",
    cf_h1:"Perfetto — you're <em>in!</em>",
    cf_sub:"We'll be in touch the moment Garda Unica launches.",
    cf_btn:"To the homepage",
    cf_foot:"Garda Unica · a product by LagoNord AI",
    _title:"Garda Unica — Sign-up confirmed"
  }
};
function setLang(lang){
  if(!I18N[lang])lang="de";
  var d=I18N[lang];
  window.currentLang=lang;
  document.documentElement.lang=lang;
  document.querySelectorAll("[data-i18n]").forEach(function(el){
    var k=el.getAttribute("data-i18n");
    if(d[k]!==undefined)el.innerHTML=d[k];
  });
  if(d._title)document.title=d._title;
  document.querySelectorAll(".lang button").forEach(function(b){b.classList.toggle("active",b.dataset.lang===lang)});
  try{var u=new URL(window.location);u.searchParams.set("lang",lang);window.history.replaceState({},"",u);}catch(e){}
}
(function(){
  var p=new URLSearchParams(window.location.search);
  var lang=p.get("lang");
  if(!lang){var nv=(navigator.language||"de").slice(0,2).toLowerCase();lang=["de","it","en"].indexOf(nv)>=0?nv:"de";}
  document.querySelectorAll(".lang button").forEach(function(b){b.addEventListener("click",function(){setLang(b.dataset.lang)})});
  setLang(lang);
})();
</script>
</body>
</html>
