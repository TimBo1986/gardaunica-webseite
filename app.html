<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garda Unica — App</title>
<meta name="description" content="Garda Unica startet in Kürze — für iPhone und Android. Trag dich ein und wir sagen dir Bescheid, sobald du sie laden kannst.">
<meta name="robots" content="index,follow">
<link rel="canonical" href="https://www.gardaunica.com/app">
<meta property="og:title" content="Garda Unica — startet in Kürze">
<meta property="og:description" content="Trag dich ein und wir sagen dir Bescheid, sobald du Garda Unica laden kannst.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://www.gardaunica.com/app">
<meta property="og:image" content="https://www.gardaunica.com/assets/og.jpg">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Sora:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --carta:#FAF5E8;--carta-warm:#F3EBD8;--carta-morn:#FDFAF2;
  --terracotta:#B54327;--terracotta-soft:#C96449;
  --sole:#E5A83A;--oliva:#5C6B3A;
  --notte:#1A2540;--notte-2:#4A5570;--notte-3:#8A93AB;
  --linea:rgba(26,37,64,.14);--linea-soft:rgba(26,37,64,.08);
  --f-display:'Fraunces',Georgia,serif;
  --f-ui:'Sora',ui-sans-serif,system-ui,sans-serif;
  --f-mono:'JetBrains Mono',ui-monospace,monospace;
  --ease:cubic-bezier(.2,.9,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--carta);color:var(--notte);font-family:var(--f-ui);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
a{color:inherit}
/* top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;max-width:640px;margin:0 auto;width:100%}
.logo{font-family:var(--f-display);font-weight:600;font-size:21px;text-decoration:none;letter-spacing:-.01em}
.logo em{font-style:italic;color:var(--terracotta)}
.lang{display:flex;gap:2px;border:1px solid var(--linea);border-radius:999px;padding:3px;background:var(--carta-morn)}
.lang button{border:0;background:none;cursor:pointer;font-family:var(--f-ui);font-size:12px;font-weight:600;letter-spacing:.04em;color:var(--notte-3);padding:5px 11px;border-radius:999px;transition:background 160ms var(--ease),color 160ms var(--ease)}
.lang button.active{background:var(--terracotta);color:var(--carta)}
.lang button:hover:not(.active){color:var(--notte)}
/* main */
main{flex:1;display:flex;align-items:center;justify-content:center;padding:24px 24px 64px;position:relative;overflow:hidden}
main::before{content:'';position:absolute;top:-140px;left:50%;transform:translateX(-50%);width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(229,168,58,.22),transparent 65%);pointer-events:none}
.card{position:relative;width:100%;max-width:460px;text-align:center}
.eyebrow{font-family:var(--f-mono);font-size:11px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--terracotta)}
.phone{width:132px;margin:0 auto 8px;border-radius:26px;background:#141414;padding:6px;box-shadow:0 30px 60px -24px rgba(26,37,64,.5)}
.phone .scr{border-radius:21px;overflow:hidden;background:#1A2540;aspect-ratio:132/272}
.phone .scr img{width:100%;height:100%;object-fit:cover;object-position:50% 0;display:block}
h1{font-family:var(--f-display);font-weight:500;font-size:clamp(26px,6vw,34px);line-height:1.16;letter-spacing:-.01em;margin-top:20px}
h1 em{font-style:italic;color:var(--terracotta)}
.sub{margin-top:14px;font-size:16px;color:var(--notte-2);line-height:1.6;max-width:38ch;margin-left:auto;margin-right:auto}
/* form */
.wl-form{max-width:400px;margin:26px auto 0;text-align:left;position:relative}
.wl-row{display:flex;gap:12px;flex-wrap:wrap}
.wl-row input{flex:1;min-width:140px}
.wl-form input[type=text],.wl-form input[type=email]{width:100%;padding:14px 16px;border-radius:12px;border:1px solid var(--linea);background:var(--carta-morn);font-family:var(--f-ui);font-size:15px;color:var(--notte);transition:border-color 160ms var(--ease),box-shadow 160ms var(--ease)}
.wl-form input::placeholder{color:var(--notte-3)}
.wl-form input:focus{outline:none;border-color:var(--terracotta);box-shadow:0 0 0 3px rgba(181,67,39,.14)}
.wl-consent{display:flex;gap:10px;align-items:flex-start;margin-top:14px;font-size:12.5px;color:var(--notte-2);line-height:1.55;cursor:pointer}
.wl-consent input{margin-top:2px;width:16px;height:16px;flex-shrink:0;accent-color:var(--terracotta);cursor:pointer}
.wl-consent a{color:var(--terracotta);font-weight:600}
.wl-hp{position:absolute;left:-9999px;width:1px;height:1px;opacity:0}
.btn-primary{display:inline-block;text-decoration:none;font-weight:600;font-size:15px;padding:15px 32px;border-radius:999px;background:var(--terracotta);color:var(--carta);transition:background 180ms var(--ease),transform 180ms var(--ease)}
.btn-primary:hover{background:var(--terracotta-soft);transform:translateY(-1px)}
.wl-form button[type=submit]{margin-top:18px;width:100%;border:none;cursor:pointer;font-family:var(--f-ui)}
.wl-form button[type=submit]:disabled{opacity:.6;cursor:default}
.wl-msg{margin-top:14px;font-size:14px;font-weight:500;min-height:1px;text-align:center}
.wl-msg.ok{color:var(--oliva)}
.wl-msg.err{color:var(--terracotta)}
/* store buttons (zum Launch aktivieren) */
.stores{display:none;justify-content:center;gap:14px;flex-wrap:wrap;margin-top:26px}
.stores.on{display:flex}
.store-btn{display:inline-flex;align-items:center;gap:10px;text-decoration:none;font-weight:600;font-size:15px;padding:13px 24px;border-radius:14px;background:var(--notte);color:var(--carta);transition:transform 180ms var(--ease)}
.store-btn:hover{transform:translateY(-1px)}
.app-more{margin-top:26px;text-align:center}
.app-more a{font-size:14px;font-weight:500;color:var(--notte-2);text-decoration:none;border-bottom:1px solid var(--linea);padding-bottom:2px;transition:color 160ms var(--ease),border-color 160ms var(--ease)}
.app-more a:hover{color:var(--terracotta);border-color:var(--terracotta)}
.foot{margin-top:30px;font-family:var(--f-mono);font-size:11px;letter-spacing:.06em;color:var(--notte-3)}
.foot a{color:var(--notte-3);text-decoration:none}
.foot a:hover{color:var(--notte)}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<div class="topbar">
  <a class="logo" href="https://www.gardaunica.com">Garda <em>Unica</em></a>
  <div class="lang" role="group" aria-label="Sprache / Lingua / Language">
    <button data-lang="de" class="active">DE</button>
    <button data-lang="it">IT</button>
    <button data-lang="en">EN</button>
  </div>
</div>

<main>
  <div class="card">
    <div class="phone">
      <div class="scr"><img src="/assets/app/oggi_greeting.jpg" alt="Garda Unica" onerror="this.parentNode.parentNode.style.display='none'"></div>
    </div>
    <span class="eyebrow" data-i18n="app_eyebrow">Sommer 2026</span>
    <h1 data-i18n="app_h1">Garda Unica startet in Kürze — für <em>iPhone und Android.</em></h1>
    <p class="sub" data-i18n="app_sub">Trag dich ein, und wir sagen dir Bescheid, sobald du sie laden kannst.</p>

    <!-- Warteliste-Formular -->
    <form class="wl-form" id="wlForm" novalidate>
      <div class="wl-row">
        <input type="text" id="wlName" name="name" autocomplete="name" required data-i18n-ph="wl_name" placeholder="Name">
        <input type="email" id="wlEmail" name="email" autocomplete="email" required data-i18n-ph="wl_email" placeholder="E-Mail">
      </div>
      <input class="wl-hp" type="text" name="hp_check" tabindex="-1" autocomplete="off" aria-hidden="true">
      <label class="wl-consent"><input type="checkbox" required><span data-i18n="wl_consent">Ich möchte zum Start benachrichtigt werden und bin mit der <a href="https://www.lagonord.de/privacy.html" target="_blank" rel="noopener">Datenschutzerklärung</a> einverstanden.</span></label>
      <button type="submit" class="btn-primary" data-i18n="wl_btn">Benachrichtige mich</button>
    </form>
    <p class="wl-msg" id="wlMsg" role="status" aria-live="polite"></p>

    <!-- ZUM LAUNCH: Formular oben ausblenden und diesen Block aktivieren.
         In den Store-Konstanten unten die echten Links eintragen, dann in
         showStores() das gewünschte Verhalten (Geräteerkennung) aktivieren. -->
    <div class="stores" id="stores">
      <a class="store-btn" id="btnIos" href="#" rel="noopener">App&nbsp;Store</a>
      <a class="store-btn" id="btnAndroid" href="#" rel="noopener">Google&nbsp;Play</a>
    </div>

    <p class="app-more"><a href="/" data-i18n="app_more">Mehr über Garda Unica erfahren →</a></p>

    <div class="foot">
      <a href="https://www.lagonord.de/imprint.html" data-i18n="app_imprint">Impressum</a>
      &nbsp;·&nbsp;
      <a href="https://www.lagonord.de/privacy.html" target="_blank" rel="noopener" data-i18n="app_privacy">Datenschutz</a>
    </div>
  </div>
</main>

<script src="/assets/waitlist.js"></script>
<script>
var I18N={
  de:{
    app_eyebrow:"Sommer 2026",
    app_h1:"Garda Unica startet in Kürze — für <em>iPhone und Android.</em>",
    app_sub:"Trag dich ein, und wir sagen dir Bescheid, sobald du sie laden kannst.",
    wl_name:"Name",wl_email:"E-Mail",wl_btn:"Benachrichtige mich",
    wl_consent:"Ich möchte zum Start benachrichtigt werden und bin mit der <a href=\"https://www.lagonord.de/privacy.html\" target=\"_blank\" rel=\"noopener\">Datenschutzerklärung</a> einverstanden.",
    wl_success:"Fast geschafft — schau in dein Postfach und bestätige deine Anmeldung.",
    wl_err:"Da ist etwas schiefgelaufen — bitte prüf dein Postfach oder versuch es später erneut.",
    wl_bademail:"Bitte gib eine gültige E-Mail-Adresse ein.",
    app_more:"Mehr über Garda Unica erfahren →",
    app_imprint:"Impressum",app_privacy:"Datenschutz",
    _title:"Garda Unica — App",
    _desc:"Garda Unica startet in Kürze — für iPhone und Android. Trag dich ein und wir sagen dir Bescheid, sobald du sie laden kannst."
  },
  it:{
    app_eyebrow:"Estate 2026",
    app_h1:"Garda Unica arriva a breve — per <em>iPhone e Android.</em>",
    app_sub:"Lascia la tua email e ti avvisiamo appena potrai scaricarla.",
    wl_name:"Nome",wl_email:"Email",wl_btn:"Avvisami",
    wl_consent:"Voglio essere avvisato al lancio e accetto l'<a href=\"https://www.lagonord.de/privacy.html\" target=\"_blank\" rel=\"noopener\">informativa sulla privacy</a>.",
    wl_success:"Ci siamo quasi — controlla la tua casella e conferma l'iscrizione.",
    wl_err:"Qualcosa è andato storto — controlla la tua casella o riprova più tardi.",
    wl_bademail:"Inserisci un indirizzo email valido.",
    app_more:"Scopri di più su Garda Unica →",
    app_imprint:"Note legali",app_privacy:"Privacy",
    _title:"Garda Unica — App",
    _desc:"Garda Unica arriva a breve — per iPhone e Android. Lascia la tua email e ti avvisiamo appena potrai scaricarla."
  },
  en:{
    app_eyebrow:"Summer 2026",
    app_h1:"Garda Unica launches soon — for <em>iPhone and Android.</em>",
    app_sub:"Leave your email and we'll let you know the moment you can download it.",
    wl_name:"Name",wl_email:"Email",wl_btn:"Notify me",
    wl_consent:"I'd like to be notified at launch and agree to the <a href=\"https://www.lagonord.de/privacy.html\" target=\"_blank\" rel=\"noopener\">privacy policy</a>.",
    wl_success:"Almost there — check your inbox and confirm your sign-up.",
    wl_err:"Something went wrong — please check your inbox or try again later.",
    wl_bademail:"Please enter a valid email address.",
    app_more:"Discover more about Garda Unica →",
    app_imprint:"Imprint",app_privacy:"Privacy",
    _title:"Garda Unica — App",
    _desc:"Garda Unica launches soon — for iPhone and Android. Leave your email and we'll let you know the moment you can download it."
  }
};
function setLang(lang){
  if(!I18N[lang])lang="de";
  var d=I18N[lang];
  window.currentLang=lang;
  document.documentElement.lang=lang;
  document.querySelectorAll("[data-i18n]").forEach(function(el){
    var k=el.getAttribute("data-i18n");
    if(d[k]!==undefined)el.innerHTML=d[k];
  });
  document.querySelectorAll("[data-i18n-ph]").forEach(function(el){
    var k=el.getAttribute("data-i18n-ph");
    if(d[k]!==undefined)el.setAttribute("placeholder",d[k]);
  });
  if(d._title)document.title=d._title;
  var md=document.querySelector('meta[name="description"]');
  if(md&&d._desc)md.setAttribute("content",d._desc);
  document.querySelectorAll(".lang button").forEach(function(b){b.classList.toggle("active",b.dataset.lang===lang)});
  try{var u=new URL(window.location);u.searchParams.set("lang",lang);window.history.replaceState({},"",u);}catch(e){}
}
(function(){
  var p=new URLSearchParams(window.location.search);
  var lang=p.get("lang");
  if(!lang){var nv=(navigator.language||"de").slice(0,2).toLowerCase();lang=["de","it","en"].indexOf(nv)>=0?nv:"de";}
  document.querySelectorAll(".lang button").forEach(function(b){b.addEventListener("click",function(){setLang(b.dataset.lang)})});
  setLang(lang);
})();

/* Warteliste-Formular initialisieren (Endpoint steckt in /assets/waitlist.js) */
if(window.GardaWaitlist){window.GardaWaitlist.init({source:"app-qr",getLang:function(){return window.currentLang||"de";},getDict:function(l){return I18N[l]||I18N.de;}});}

/* ===== ZUM LAUNCH: Store-Links + Geräteerkennung =====================
 * 1) Links eintragen:
 *    document.getElementById('btnIos').href     = 'https://apps.apple.com/app/idXXXXXXXX';
 *    document.getElementById('btnAndroid').href = 'https://play.google.com/store/apps/details?id=XXX';
 * 2) Formular ausblenden und Buttons zeigen:
 *    document.getElementById('wlForm').style.display='none';
 *    document.getElementById('stores').classList.add('on');
 * 3) Optional nur den passenden Store zeigen (iPhone/Android automatisch):
 *    var os = detectOS();
 *    if(os==='ios')    document.getElementById('btnAndroid').style.display='none';
 *    if(os==='android')document.getElementById('btnIos').style.display='none';
 * =================================================================== */
function detectOS(){
  var ua=navigator.userAgent||navigator.vendor||"";
  if(/iPad|iPhone|iPod/i.test(ua)||(navigator.platform==="MacIntel"&&navigator.maxTouchPoints>1))return "ios";
  if(/android/i.test(ua))return "android";
  return "other";
}
</script>
</body>
</html>
